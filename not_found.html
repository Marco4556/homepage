<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>four zero four</title>
    <style>
        /* STILE CSS BIOS */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.4;
            margin: 20px;
            text-transform: uppercase;
        }

        .bios-container {
            max-width: 800px;
        }

        .header {
            margin-bottom: 20px;
            border-bottom: 1px solid #ffffff;
            padding-bottom: 5px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: #ffffff;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bios-container">
        <div class="header">
            ITALIAN MICROTRENDS BIOS V.6.9
        </div>
        <p>ERROR 404</p>
        <p>PAGE NOT FOUND<span class="cursor"></span></p>
    </div>

</body>
</html>
